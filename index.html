<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Álvaro Pavón | Terminal OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="login-screen" class="terminal-container">
        <div class="login-box">
            <h2>> SISTEMA RESTRINGIDO_</h2>
            <p class="sys-msg">Inicie sesión para acceder a la terminal.</p>
            
            <div class="input-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" readonly placeholder="...">
            </div>
            <div class="input-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" readonly placeholder="...">
            </div>
            
            <button id="hack-btn" class="btn-hack">> [ HACK ]_</button>
            <p id="access-msg" class="hidden blinking-text">ACCESO CONCEDIDO</p>
        </div>
    </div>

    <main id="portfolio-content" class="hidden">
        <div class="scanlines"></div>
        
        <div id="terminal-wrapper">
            <div id="terminal-output">
                <p>> ÁLVARO_OS v1.0.0 inicializado.</p>
                <p>> Autenticación correcta. Bienvenido, invitado.</p>
                <p>> Escriba <span class="highlight">help</span> o seleccione un comando del menú. (Puede usar la tecla TAB para autocompletar).</p>
            </div>
            
            <div id="command-menu" class="cmd-menu">
                <button class="cmd-btn" data-cmd="whoami">[ whoami ]</button>
                <button class="cmd-btn" data-cmd="sobre_mi">[ sobre_mi ]</button>
                <button class="cmd-btn" data-cmd="experiencia">[ experiencia ]</button>
                <button class="cmd-btn" data-cmd="formacion">[ formacion ]</button>
                <button class="cmd-btn" data-cmd="proyectos">[ proyectos ]</button>
                <button class="cmd-btn" data-cmd="proyecto_destacado">[ proyecto_destacado ]</button>
                <button class="cmd-btn" data-cmd="hackthebox">[ hackthebox ]</button>
                <button class="cmd-btn" data-cmd="cv">[ cv ]</button>
                <button class="cmd-btn" data-cmd="contacto">[ contacto ]</button>
                <button class="cmd-btn" data-cmd="colaborar">[ colaborar ]</button>
                <button class="cmd-btn" data-cmd="clear">[ clear ]</button>
            </div>

            <div class="input-line">
                <span class="prompt">guest@alvaro-os:~$</span>
                <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
